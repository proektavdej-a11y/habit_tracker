{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0"><i class="fas fa-plus-circle"></i> Новая привычка</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Название привычки *</label>
                        <input type="text" class="form-control" id="name" name="name" required 
                               placeholder="Например: Утренняя зарядка">
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Описание</label>
                        <textarea class="form-control" id="description" name="description" rows="3"
                                  placeholder="Что вы будете делать?"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="category" class="form-label">Категория</label>
                        <select class="form-select" id="category" name="category">
                            <option value="Здоровье">Здоровье</option>
                            <option value="Спорт">Спорт</option>
                            <option value="Образование">Образование</option>
                            <option value="Работа">Работа</option>
                            <option value="Личное развитие">Личное развитие</option>
                            <option value="Другое">Другое</option>
                        </select>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Сохранить привычку
                        </button>
                        <a href="/habits" class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
