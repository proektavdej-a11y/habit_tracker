{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card fade-in">
            <div class="card-header bg-transparent">
                <h3 class="text-center"><i class="fas fa-user-plus"></i> Регистрация</h3>
                <p class="text-center text-secondary">Создайте новый аккаунт</p>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label>Имя пользователя *</label>
                        <input type="text" class="form-control" name="username" required 
                               placeholder="Как вас называть?">
                        <small class="text-secondary">Будет отображаться в профиле</small>
                    </div>
                    
                    <div class="mb-3">
                        <label>Email (необязательно)</label>
                        <input type="email" class="form-control" name="email" 
                               placeholder="your@email.com">
                        <small class="text-secondary">Можно оставить пустым</small>
                    </div>
                    
                    <div class="mb-3">
                        <label>Пароль *</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>
                    
                    <div class="mb-3">
                        <label>Подтвердите пароль *</label>
                        <input type="password" class="form-control" name="confirm_password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-check"></i> Зарегистрироваться
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <p>Уже есть аккаунт? <a href="/login" class="text-success">Войти</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
